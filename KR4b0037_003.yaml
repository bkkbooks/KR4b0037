body:
  text: 卷三與高驪道人書與高驪道人書上座竺法深中州劉公之弟子體德貞峙道俗綸綜往在京邑維持法網內外俱瞻弘道之匠也頃以道業靖濟不耐塵俗考室山澤修德就閒今在剡縣之𡵙山率合同遊論道說義高栖浩然遐邇有詠高僧傳四與桓太尉論州符求沙門名籍書與桓太尉論州符求沙門名籍書隆安三年四月五日京邑沙門等頓首白夫標極有宗則仰之者至理契神冥則沐浴彌深故尼父素室顏氏流連豈不以道隆德盛直往忘返者哉貧道等雖人凡行薄奉修三寶愛自天至信不待習但日損功德撫心增愾賴聖主哲王復躬弘其道得使山居者騁業城傍者間道緣皇澤曠灑朽幹蒙榮然沙門之於世也猶虛舟之寄大壑耳其來不以事退亦乘閒四海之內竟自無宅邦亂則振錫孤遊道洽則欣然俱萃所以自遠而至良有以也將振宏綱於季世展誠心於百代而頃頻被州符求沙門名籍煎切甚急未悟高旨野人易懼抱憂實深遂使禪人失靜勤士廢行喪精絶氣達旦不寐索然不知何以自安伏願明公扇唐風於上位待白足於其下使懷道獲濟有志俱全則身亡體盡畢命此矣天聽殊邈或未具𥳑謹以上聞伏追悚息弘明集十二大小品對比要鈔序夫般若波羅密者衆妙之淵府群智之玄宗神王之所由如來之照功其為經也至無空豁廓然無物者也無物於物故能齊於物無智於智故能運於智是故夷三脫於重玄齊萬物於空同明諸佛之始有盡群靈之本無登十住之妙階趣無生之徑路何者耶賴其智無故能為用夫無也者豈能無哉無不能自無理亦不能為理理不能為理則理非理矣無不能自無則無非無矣是故妙階則非階無生則非生妙由乎不妙無生由乎生是以十住之稱興乎未足定號般若之智生乎教迹之名是故言之則名生設教則智存智存於物實無迹也名生於彼理無言也何則至理冥壑歸乎無名無名無始道之體也無可不可者聖之慎也苟慎理以應動則不得不寄言宜明所以寄宜暢所以言理冥則言廢忘覺則智全若存無以求寂希智以忘心智不足以盡無寂不足以冥神何則故有存於所存有無於所無存乎存者非其存也希乎無者非其無也何則徒知無之為無莫知所以無知存之為存莫知所以存希無以忘無故非無之所無寄存以忘存故非存之所存莫若無其所以無忘其所以存忘其所以存則無存於所存遺其所以無則忘無於所無忘無故妙存妙存故盡無盡無則忘玄忘玄故無心然後二迹無寄無有冥盡是以諸佛因般若之無始明萬物之自然衆生之喪道溺精神乎欲淵悟群俗以妙道漸積損至無設玄德以廣教守谷神以存虛齊衆首於玄同還群靈乎本無蓋聞出小品者道士也嘗游外域歲數悠曩未見典載而不詳其姓名矣嘗聞先學共傳云佛去世後從大品之中鈔出小品世傳其人唯目之以淳德驗之以事應明其致而已亦莫測其由也夫至人也覽通群妙凝神玄冥靈虛響應感通無方建同德以接化設玄教以悟神述往迹以搜滯演成規以啓源或因變以求通事濟而化息適任以全分分足則教廢故理非乎變變非乎理教非乎體體非乎教故千變萬化莫非理外神何動哉以之不動故應變無窮無窮之變非聖在物物變非聖聖未始於變故教遺興乎變理滯生乎權接應存乎物理致同乎歸而辭數異乎本事備乎不同不同之功由之萬品神悟遲速莫不緣分分暗則功重言積而後悟質明則神朗觸理則玄暢輕之與重未始非分是以聖人之為教不以功重而廢分分易而存輕故群品所以悟分功所以成必須重以運通因其宜以接分此為悟者之功重非聖教之有煩令統所以約教功所以全必待統以適任約文以領玄領玄則易通因任則易從而物未悟二本之不異統致同乎宗便以言數為大小源流為精粗文約謂之小文殷謂之大順常之為通因變之為舞守數之為得領統之為失而彼揩文之徒羈見朿教頃著阿含神匱分淺才不經宗儒墨大道域定聖人志局文句詰教難權謂崇要為達諒領統為傷宗須徵驗以明實效應則疑伏是以至人順群情以徵理取驗乎沸油明小品之體本塞群疑幽滯因物之徵驗故示驗以應之今不可以趣徵於一驗目之為淳德效喪於事實謂之為常人而未達神化之權統玄應於將來暢濟功於殊塗運無方之一致而察殊軌為異統觀奇化為逆理位大寶為欣王聚濟貨為欲始徒知至聖之為教而莫知所以教是以聖人標域三才玄定萬品教非一途應物萬方或損教違無寄通適會或抱一御有繫文明宗崇聖典為世軌則夫體道盡神者不可詰之以言教游無蹈虛者不可求之於形器是以至人於物遂通而已明乎小大之不異暢玄標之有寄因順物宜不拘小派或以大品辭茂事廣喻引宏奧雖窮理有外終於玄同然其明宗統一會致不異斯亦大聖之時教百姓之分致苟以分致之不同亦何能求簡於聖哉若以簡不由聖豈不寄言於百姓夫以萬聲鐘響響一以持之萬物感聖聖亦寂以應之是以聲非乎響言非乎聖明矣且神以知來夫知來者莫非其神也機動則神朗神朗則逆鑒明夫來往常在鑒內是故至人鑒將來之希纂明才致之不並簡教迹以崇順擬群智之分向關之者易知希之者易行而大品言數豐具辭領富溢問對衍奧而理統宏邃雖玄宗易究而詳事難備是以明夫為學之徒須尋迹旨關其所往究覽宗致標之興盡然後悟其所滯統其玄領或須練紘群問明其酬對探幽研賾盡其妙致或以教衆數溢諷讀難究欲為寫崇供養力致無階諸如此例群仰分狹窺者絶希是故出小品者參引王統簡領群目筌域事數標判由宗以為小品而辭喻清約運旨亹亹然其往往明宗而標其會致使宏統有所於理無損自非至精孰其明矣又察其津塗尋其妙會覽始原終研極奧旨領大品之王標備小品之玄致縹縹焉覽精乎玄味精矣盡矣無以加矣斯人也將神王於冥津群形於萬物量不可測矣宜求之於筌表寄之於玄外惟昔聞之曰夫大小品者出於本品本品之文有六十萬言今游天竺未適於晉今此二鈔亦興於于大本出者不同也而小品出之在先然斯二經雖同出於本品而時往有不同者或小品之所具大品所不載大品之所備小品之所闕所以然者或以二者之事同互相以為賴明其本一故不並矣而小品至略玄總事要舉宗大品雖辭致婉巧而不喪本歸至於說者或以專句推事而不尋況旨或多以意裁不依經本故使文流相背義致同乖群義偏狹喪其玄旨或失其引統錯徵其事巧辭辨僞以為經體雖文藻清逸而理統乖宗是以先哲出經以梵為本小品雖鈔以大為宗推梵可以明理徵大可以驗小若苟任胸懷之所得背聖教之本旨徒常於新聲苟競於異常異常未足以徵本新聲不可以經宗而遺異常之為談而莫知傷本之為至傷本則失統失統則理滯理滯則或殆若以殆而不思其源困而不尋其本斯則外不關於師資內不由於分得豈非仰資於有知自塞於所尋困蒙於所滯自窮於所通進不暗常退不研新說不依本理不經宗而忽詠先舊毀呰古人非所以為學輔其自然者哉夫物之資生靡不有宗事之所由莫不有本宗之與本萬里之源矣本喪則理絶根朽則枝傾此自然之數也未紹不然矣於斯也徒有天然之才淵識邈世而未見大品覽其源流明其理統而欲寄懷小品率意造義欲寄其分得標顯自然希邈常流徒尚名實而竭其才思玄格聖言趣悅群情而乖本違宗豈相望乎大品也哉如其不悟將恐遂其所惑以罔後生是故推考異同驗其虛實尋流窮源各有歸趣而小品引宗時有諸異或辭倒事同而不乖旨歸或取其初要廢其後致或筌次事宗倒其首尾或散在群品略撮玄要時有此事乖互不同又大品事數甚衆而辭曠浩衍本欲推求本宗明驗事旨而用思甚多勞審功又寡且稽驗廢事不覆速急是故余今所以例玄事以駢比標二品以相對明彼此之所在辨大小之有先雖理惑非深奧而事對之不同故採其所究精粗並兼研盡事迹使驗之有由故尋源以求實趣定於理宗是以考大品之宏致驗小品之總要搜玄沒之所存求同異之所寄有在尋之有軌爾乃貫綜首尾推步玄領究其槃結辨其凝滯使文不違旨理無負宗棲驗有寄辨不失徵且於希詠之徒浪神游宗陶冶玄要推尋源流關虛考實不亦夷易乎若其域乖體極對非理標或其所寄者願俟將來摩訶薩幸為研盡備其未詳也明刊釋藏跡字函八天台山銘序余覽內經山記云剡縣東南有天台山文選十一李善注往天台當由赤城山為道徑同上剡縣西有天台山蓋仙聖之所棲翔道士之所鱗萃文殊像讚并序文殊師利者是遊方菩薩因離垢之言而有斯目非厥號所先也原夫稱謂之生蓋至道興其邈何者虛引之性彰於五德軌世之表聞於童真庶仁之風移則感時之訓興故云儒首以法王子為名焉夫欲窮其淵致者必存其深大終古邈矣豈言像之所及難算之劫功高積塵悠悠遐曠焉可謂諸言略敘其統若人之始生也爰自帝胄尊號法王無上之心兆於獨悟發中之感無不由也近一遇正覺而靈殊內映玄景未移遂超發道位於是深根永搆於沖壤條異神柯而月茂慈悲之氣與慧風俱扇三達之明與日月竝輝具體而微固已功侔法身矣若乃天機將運即神通為館宇圓應密會以不迹為影迹斯其所以動不離寂而彌綸宇宙倏無常境而名冠遊方者也世尊興出乃授躍進之明顯潛德於香林因慶雲而西徂復龍見於茲剎法輪既轉則玄音屢唱對明淵極輒暢法深言道映開士故諸佛美其稱體絶塵俗故濯纓者高其迹非夫合天和以挺祚吸沖氣而為靈舒重霄以回蔭吐德音而流響亦孰能與於此哉時欲搖蕩群生之性宅玄宗而獨至開宏基於一簣廓恆沙而為宇若然而不說文殊之風則未達無窮之量長笑於大方之疾矣自世尊泥洹幾將千祀流光福蔭復與時而升降由是冥懷宗極者感彼長津之喪源懼風日之潛損遂共長表容之金石繼以文頌人思自盡庶雲露以增潤今之所遇蓋是數減百年有轉輪王王閰浮提號曰阿育仰窺遺軌擬而像焉雖真宰不存於形而靈位若有主雖有司不以情求而感至斯應神變之異屢干民聽因僉悟時信有自來矣意以為接頽薄之運實由冥維之功通天昏否之俗固非一理所弘是以託想之賢祗誠攸寄絲紐將絶之緒引豪心以標位乃遠模良匠像天所像感來自表不覺欣然同詠為之讚曰眇眇童真弱齡啓蒙含英吐秀登玄履峰神以道王體以沖通浪化遊方乃軌高蹤流光遺映爰暨茲邦思對淵匠靖一惟恭靈襟絶代庶落塵封釋延一廣清涼傳下竺法護像讚竺法護像讚護公澄寂道德淵美微令穹谷枯泉漱水邈矣護公天挺宏懿濯足流沙傾拔玄致高僧傳一于法蘭像讚于氏超世綜體玄旨嘉遁山澤仁感虎兕高僧傳四于道邃像讚英英上人識通理清朗質玉瑩德音蘭馨高僧傳四逍遙論夫逍遙者明至人之心也莊生建言大道而寄指鵬鷃鵬以營生之路曠故失適於體外鷃以在近而笑遠有矜伐於心內至人乘天正而高興遊無窮於放浪物物而不物於物則遙然不我得玄感不為不疾而速則逍然靡不適此所以為逍遙也若夫有欲當其所足足於所足快然有似天真猶饑者一飽渴者一盈豈忘蒸嘗於糗糧絶觴爵於醪醴哉苟非至足豈所以逍遙乎世說文學篇劉峻注即色論妙觀章夫色之性也不自有色色不自有雖色而空故曰色即為空色復異空世說文學篇劉峻注失題失題石室可蔽身寒泉濯溫手姑蘇志八
