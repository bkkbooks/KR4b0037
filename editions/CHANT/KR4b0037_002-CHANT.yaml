body:
  text: 卷二上皇帝書上皇帝書遁頓首言敢以不才希風世表未能鞭後用愆靈化蓋沙門之義法出佛之聖彫淳反朴絕欲歸宗遊虛玄之肆守內聖之則佩五戒之貞毗外王之化諧無聲之樂以自得為和篤慈愛之孝蠕動無傷銜撫恤之哀永悼不仁秉未兆之順遠防宿命挹無位之節履亢不悔是以哲王御世南面之重莫不欽其風尚安其逸軌探其順心略其形敬故令歷代彌新矣陛下天鍾聖德雅尚不倦道遊靈模日昃忘御可謂鐘鼓晨極聲滿天下清風既劭莫不幸甚也願陛下齊齡二儀弘敷至法去陳信之妖誣尋丘禱之弘議絕小塗之致泥奮宏轡於夷路若然者太山不淫季氏之旅得一以成靈王者非員丘而不禋得一以永貞若使貞靈各一人神相忘君君而下無親舉神神而呪不加靈玄德交被民荷冥祐恢恢六合成吉祥之宅洋洋大晉為元亨之宇常無為而萬物歸宗執大象而天下自往國典刑殺則有司存焉若生而非惠則賞者自得戮而非怒則罰者自刑弘公器以厭神意提銓衡以極冥量所謂天何言哉四時行焉貧道野逸東山與世異榮菜蔬長阜漱流清壑襤縷畢世絕窺皇階不悟乾光曲曜猥被蓬蓽頻奉明詔使詣上京進退維谷不知所厝自到天庭屢蒙引見優游賓禮策以微言每愧才不拔滯理無拘新不足對揚玄謨允塞視聽踧踖侍人流汗位席曩四翁赴漢干木蕃魏皆出處有由默語適會今德非昔人動靜乖理遊魂禁省鼓言帝側將困非據何能有為且歲月僶俛感若斯之歎況復同志索居綜習遼落迴首東顧孰能無懷上願陛下特蒙放遣歸之林薄以鳥養鳥所荷為優謹露板以聞伸其愚管裹糧望路伏待慈詔座右銘勤之勤之至道非彌奚為淹滯弱喪神奇茫茫三界眇眇長羈煩勞外湊冥心內馳徇赴欽渴緬邈忘疲人生一世涓若露垂我身非我云云誰施達人懷德知安必危寂寥清舉濯累禪池謹守明禁雅翫玄規綏心神道抗志無為寥朗三蔽融冶六疵空同五陰虛豁四肢非指喻指絕而莫離妙覺既陳又玄其知宛轉乎任與物推移過此以往勿思勿議敦之覺父志在嬰兒釋迦文佛像讚并序夫立人之道曰仁與義然則仁義有本道德之謂也昔姬周之末有大聖號佛天竺釋王白淨之太子也俗氏母族厥姓裘曇焉仰靈冑以丕承藉儁哲之遺芳吸中和之誕化稟白淨之顥然生自右脅弱而能言諒天爵以不加為貴誠逸祿以靡須為足故常夕愓上位逆旅紫庭紆軫儲宮擬翮區外俄而高逝周覽郊野四闢皇扉三鑒疾苦風人厲辭以激興乃甘心受而莫逆訊大猷於有道慨在茲之致淹遂乃明發遐征栖遲幽閒脫皇儲之重任希無待以輕舉褫龍章之盛飾貿窮巖之襹褐資送之儔自崖而反矣爾乃抗志匪石安仁以山班卉匡居摧心立盟釐安般之氣緒運十算以質心併四籌之八記從二隨而簡延絕送迎之兩際緣妙一於鼻端發三止之矇秀洞四觀而合泯五陰遷於還府六情虛於靜林涼五內之欲火廓太素之浩心濯般若以進德潛七住而挹玄搜冥魚於六絕齒既立而廢筌豁萬劫之積習同生知於當年掩五濁以擅曜嗣六佛而徵傳偉唯丈六體佩圓光啟度黃中色豔紫金運動陵虛悠往倏忽八音流芳逸豫揚彩妙覽未兆則卓絕六位曲成已著則化隆三五沖量弘乎太虛神蓋宏於兩儀易簡待以成體太和擬而稱邵圓蓍者象其神寂方卦者法其智周照積祐之留詳元宿命以制作或綢之以德義或疏之以沖風亮形搖於日新期妙主於不盡美既青而青藍逞百鍊以就粹導庶物以歸宗拔堯孔之外楗屬八億以語極罩墳索以興典掇道行之三無絡聃周以曾玄神化著於西域若朝暉昇於暘谷民望景而興行猶曲調諧於宮商當是時也希夷緬邈於羲風神奇卓絕於皇軒蔚彩沖漠於周唐頌詠有餘於鄒魯信可謂神化之都領皇王之宗謨也年逾縱心泯迹泥洹夫至人時行而時止或隱此而顯彼迹絕於忍土冥歸於維衛俗徇常以駭奇固以存亡而統之至於靈覺之性三界殄悴豁若川傾頹如乾墜黔首與永夜同幽冥流與涸津竝匱六度與崩岑俱褫三乘與絕軸解轡門徒泣血而心喪百靈銜哀而情悸夫道高者應卑因巡者親譽故不祈哭而哭豈非兼忘天下易使天下兼忘難靈風播越環周六合曆數終於赤縣後死所以與聞景仰神儀而事絕於千載祗洹既已漂落玉樹卒亦荒蕪道喪人亡時亦已矣遁以不才仰遵大猷追朝陽而弗暨附桑榆而未升神馳在昔願言再欽遂援筆興古述厥遐思其詞曰大上邈矣有唐統天孔亦因周蘧廬三傳明明釋迦寔惟帝先應期叡作化融竺乾交養恬和濯粹沖源邁軌世王領宗中玄堂構洪模揭秀負靈峻誕崑岳量裒太清太像罕窺乃圓其明玄音希和文以八聲煌煌慧炬燭我宵征人欽其哲孰識其冥望之霞舉即亦雲津威揚夏烈溫柔晞春比器以形卓機以神卷即煙滅騰亦龍伸鼓舞丹壑靈氣惟新誰與茲作獨運陶鈞三無衷玄八億致遠二部既弘雙翰惟典充以瓌奇恬以易簡藏諸蘊匵寔之令善可善善因乃讚乃演致存言性豈伊弘闡日月貞朗顯晦周遍生如紛霧瞹來已晞至人全化跡隨世微假云泥洹言告言歸遺風六合佇方赤畿象罔不存誰與悟機鏡心乘翰庶覿冥暉阿彌陀佛像讚并序夫六合之外非典籍所模神道詭世豈意者所測故曰人之所知不若其所不知每在常輒欲以所不能見而斷所未能了故令井蛙有坎宅之矜馮夷有秋水之伐故其冥矣余游大方心倦無垠因以靜暇復伸諸奇麗佛經記西方有國國名安養迴遼迥邈路踰恆沙非無待者不能遊其疆非不疾者焉能致其速其佛號阿彌陀晉言無量壽國無王制班爵之序以佛為君三乘為教男女各化育於蓮華之中無有胎孕之穢也館宇宮殿悉以七寶皆自然懸構制非人匠苑囿池沼蔚有奇榮飛沈天逸於淵藪逝寓群獸而率真閶闔無扇於瓊林玉響天諧於簫管冥霄隕華以闔境神風拂故而納新甘露徵化以醴被蕙風導德而芳流聖音應感而雷響慧澤雲垂而沛清學文噏兮而貴言真人冥宗而廢翫五度憑虛以入無般若遷知而出玄眾妙於茲大啟神化所以永傳別有經記以錄其懿云此晉邦五末之世有奉佛正戒諷誦阿彌陀經誓生彼國不替誠心者命終靈逝化往之彼見佛神悟即得道矣遁生末蹤忝廁殘迹馳心神國非所敢望乃因匠人圖立神表仰瞻高儀以質所天詠言不足遂復係以微頌其詞曰王猷外釐神道內綏皇矣正覺寔兼宗師泰定軫曜黃中秀姿恬智交泯三達玄夷啟境金方緬路悠迴于彼神化悟感應機五度砥操六慧研微空有同狀玄門洞開詠歌濟濟精義順神玄肆洋洋三乘詵詵藏往摹故知來惟新二才孰降朗滯由人造化營域雲構峨峨紫館辰峙華宇星羅玉闈通方金墉啟阿景傾朝日豔蔚晨霞神提迴互九源曾深浪無筌忘鱗罕餌淫澤不司虞駭翼懷林有客驅徒雨埋機心甘露敦洽蘭蕙助馨化隨雲濃俗興風清葳蕤消散靈飆掃英瓊林諧響八音文成珉瑤沈粲芙蕖晞陽流澄其潔蕊播其香潛爽冥萃載哲來翔孕景中葩結靈幽芳類諸風化妙兼于長邁軌一變同規坐忘文殊師利讚童貞領玄致靈化實悠長昔為龍種覺今則夢遊方惚恍乘神浪高步維衛鄉擢此希夷質映彼虛閒堂觸類興清遘目擊洞兼忘梵釋欽嘉會閑邪納流芳彌勒讚大人軌玄度弱喪升虛遷師通資自廢釋迦登幽閒彌勒承神第聖錄載靈篇乘乾因九五龍飛兜率天法鼓震玄宮逸響亮三千晃晃凝素姿結加曜芳蓮寥朗高懷興八音暢自然恬智冥徼妙縹眇詠重玄磐紆七七紀應運莅中幡挺此四八姿映蔚華林園亹亹玄輪奏三攄在昔緣維摩詰讚維摩詰讚維摩體神性陵化昭機庭無可無不可流浪入形名民動則我疾人恬我氣平恬動豈形影形影應機情玄韻乘十哲頡頑傲四英忘期遇濡首亹亹讚死生善思菩薩讚善思菩薩讚玄和吐清氣挺茲命世童登臺發春詠高興希遐蹤乘虛感靈覺震網發童蒙外見憑寥廓有無自冥同忘高故不下蕭條數仞中因華請無著陵虛散芙蓉能仁暢玄句即色自然空空有交映迹冥知無照功神期發筌悟豁爾自靈通法作菩薩不二入菩薩讚法作菩薩不二入菩薩讚乃昔有嘉會茲日多神靈維摩發淵響請定不二名玄音將進和法作率所情亹亹玄心運寥寥音氣清麤二標起分妙一寄無生首閈菩薩讚首閈菩薩讚首閈齊吾我造理因兩虛兩虛似得妙同象反入麤何以絕塵迹忘一歸本無空同何所貴所貴在恬愉不眴菩薩讚有愛生四淵淵況世路永未若觀無得德物物自靜何以虛靜間恬智翳神穎絕迹遷靈梯有無無所騁不眴冥玄和栖神不二境善宿菩薩讚體神在忘覺有慮非理盡色來投虛空響朗生應軫託陰遊重冥冥亡影迹隕三界皆勤求善宿獨玄泯善多菩薩讚自大以跨小小者亦駭大所謂大道者遺心形名外都忘絕鄙當冥默自玄會善多體沖姿豁豁高懷泰首立菩薩讚為勞由無勞應感無所思悠然不知樂物通非我持渾形同色欲思也誰及之嘉會言玄志首立必體茲月光童子讚靈童綏神理恬和自交忘弘規愍昏俗統體稱月光心為兩儀蘊迹為流溺梁英姿秀乾竺名播赤縣鄉神化詭俗網玄羅摯遊方丘巖積陳痾長驅幸玉堂汲引興有待冥歸無盡場戢翼栖高嵎淩風振奇芳
