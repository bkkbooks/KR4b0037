body:
  text: 卷一詠懷詩五首傲兀乘尸素日往復月旋弱喪困風波流浪逐物遷中路高韻溢窈窕欽重玄重玄在何許採真遊理閒苟簡為我養逍遙使我閑寥亮心神瑩含虛映自然亹亹沈情去彩彩沖懷鮮踟躕觀象物未始見牛全毛鱗有所貴所貴在忘筌其二端坐鄰孤影眇罔忘思劬偃蹇收神轡領略綜名書涉老咍雙玄披莊玩太初詠發清風集觸思皆恬愉俯欣質文蔚仰悲二匠徂蕭蕭柱下迥寂寂蒙邑虛廓矣千載事消液歸空無無矣復何傷萬殊歸一塗道會貴冥想罔象掇玄珠悵怏濁水際機忘映清渠反鑒歸澄漠容與含道符心與理理密形與物物疏蕭索人事去獨與神明居其三晞陽熙春圃悠緬歎時往感物思所託蕭條逸韻上尚想天台峻髣髴巖階仰冷風灑蘭林管瀨奏清響霄崖育靈藹神疏含潤長丹沙映翠瀨芳芝曜五爽苕苕重岫深寥寥石室朗中有尋化士外身解世網抱朴鎮有心揮玄拂無想隗隗形崖頹冏冏神宇敞宛轉元造化縹瞥鄰人象願投若人蹤高步振策杖其四閑邪託靜室寂寥虛且真逸想流巖阿朦朧望幽人慨矣玄風濟皎皎離染純時無問道睡行歌將何因靈溪無驚浪四岳無埃塵余將遊其嵎解駕輟飛輪芳泉代甘醴山果兼時珍修林暢輕跡石宇庇微身崇虛習本照損無歸昔神曖曖煩情故零零沖氣新近非域中客遠非世外臣淡泊為無德孤哉自有鄰其五坤基葩簡秀乾光流易穎神理速不疾道會無陵騁超超分石人握玄攬機領余生一何散分不諮天挺沈無冥到韻變不揚蔚炳冉冉年往逡悠悠化期永翹首希玄津想登故未正生途雖十三日已造死境願得無身道高棲沖默靖述懷詩二首翔鸞鳴崑崿逸志騰冥虛惚恍迴靈翰自肩趨南嵎濯足戲流瀾採練銜神蔬高吟瀨芳醴頡頏登神梧蕭蕭猗明翩眇眇育清軀長想玄運夷傾首俟靈符河清誠可期戢翼令人劬其二𩮀角敦大道弱冠弄雙玄逡巡釋長羅高步尋帝先妙損階玄老忘懷浪濠川達觀無不可吹累皆自然窮理增靈新昭昭神火傳熙怡安沖漠優游樂靜閒膏腴無爽味婉孌非雅弦恢心委形度亹亹隨化遷土山會集詩三首并序土山會集詩三首并序閒與何驃騎期當為合八關齋以十月二十二日集同意者在吳縣土山墓下三日清晨為齋始道士白衣凡二十四人清和肅穆莫不靜暢至四日朝眾賢各去余既樂野室之寂又有掘藥之懷遂便獨住於是乃揮手送歸有望路之想靜拱虛房悟外身之真登山採藥集巖水之娛遂援筆染翰以慰二三之情其一建意營法齋里仁契朋儔相與期良晨沐浴造閒丘穆穆升堂賢皎皎清心修窈窕八關客無楗自綢繆寂默五習真亹亹勵心柔法鼓進三勸激切清訓流悽愴願弘濟闔堂皆同舟明明玄表聖應此童蒙求存誠夾室裏三界讚清休嘉祥歸宰相藹若慶雲浮其二三悔啟前朝雙懺暨中夕鳴禽戒朗旦備禮寢玄役蕭索庭賓離飄颻隨風適踟躕歧路嵎揮手謝內析軒軒馳中田習習陵電擊息心投佯步零零振金策引領望征人悵恨孤思積咄矣形非我外物固已寂吟詠歸虛房守真玩幽賾雖非一往遊且以閒自釋其三靖一潛蓬廬愔愔詠初九廣漠排林篠流飆灑隙牖從容遐相逸採藥登崇阜崎嶇升千尋蕭條臨萬畝望山樂榮松瞻澤哀素柳解帶長陵坡婆娑清川右冷風解煩懷寒泉濯溫手寥寥神氣暢欽若盤春藪達度冥三才恍惚喪神偶遊觀同隱丘愧無連化肘詠利城山居詠利城山居五岳盤神基四瀆涌蕩津動求目方智默守標靜仁苟不宴出處託好有常因尋元存終古洞往想逸民玉潔其嚴下金聲瀨沂濱捲筆藏紛霧震褐拂埃塵跡從尺蠖屈道與騰龍伸峻無單豹代分非首陽真長嘯歸林嶺蕭洒任陶鈞詠禪思道人并序孫長樂作道士坐禪之像并而讚之可謂因俯對以寄誠心求參焉於衡扼圖巖林之絕勢想伊人之在茲余精其制作美其嘉文不能嘿已聊著詩一首以繼於左其詞曰雲岑竦太荒落落英岊布迴壑佇蘭泉秀嶺攢嘉樹蔚薈微遊禽崢嶸絕蹊路中有沖希子端坐摹太素自強敏天行弱志慾無欲喻音玉質陵風霜凄凄厲清趣指心契寒松綢繆諒歲暮會衷兩息閒緜緜進禪務投一滅官知攝二由神遇承蜩纍危九累十亦凝注懸想元氣地研幾革麤慮冥懷夷震驚泊然肆幽度曾筌攀六淨空洞浪七住逝虛乘有來永為有待馭四月八日讚佛詩三春迭云謝首夏含朱明祥祥今日泰朗朗玄夕清菩薩彩靈和眇然因化生四王應期來矯掌承玉形飛天鼓弱羅騰躍散芝英綠瀾頹龍首縹蕊翳流泠芙蕖育神葩傾柯獻朝榮芳津霧四境甘露凝玉瓶珍祥盈四八玄黃曜紫庭感降非情想恬泊無所營玄根泯靈俯神條秀形名圓光朗東旦金姿豔春精令和總八音吐納流芬馨跡隨因溜浪心與太虛冥六度啟窮俗八解濯世纓慧澤融無外空同忘化情詠八日詩三首大塊揮冥樞昭昭兩儀映萬品誕遊華澄清凝玄聖釋迦乘虛會圓神秀機正交養衛恬和靈知溜性命動為務下尸寂為無中鏡其二真人播神化流渟良有因龍潛兜術邑漂景閻浮濱佇駕三春謝飛轡朱明旬八維披重藹九霄落芳津玄祗獻萬舞般遮奏伶倫淳白凝神宇蘭泉渙色身投步三才泰揚聲五道泯不為故為貴忘奇故奇神其三緬哉玄古思想託因事生相與圖靈器像也像彼形黃裳羅帕質元服拖緋青神為恭者惠跡為動者行虛堂陳藥餌蔚然起奇榮疑似垂嚱微我諒作者情於焉遺所尚肅心擬太清五月長齋詩炎精育沖氣朱離吐凝陽廣漢潛涼變凱風乘和翔令月肇清齋德澤潤無疆四部欽嘉期潔己升雲堂靜晏和春暉夕愓厲秋霜蕭條詠林澤恬愉味城傍逸客研沖賾綵綵運宮商匠者握神標乘風味玄芳淵汪道行深婉婉化理長亹亹羅摩虛德音暢遊方罩罕妙傾玄絕致由近藏略微容簡八言振道綱掇煩練陳句臨危折婉章浩若驚飆散冏若輝夜光寓言豈所託意得筌自喪霑濡妙習融靡靡輕塵亡蕭索情牖頹寥朗神軒張誰謂冥津遐一悟可以航願為海遊師櫂枻入滄浪騰波濟漂客玄歸會道場詠大德詩遐想存玄哉沖風一何敞品物緝榮熙生塗連惚恍既喪大澄真物誘則智蕩昔間庖丁子揮戈在神往苟能嗣沖音攝生猶指掌乘彼來物閒投此默照朗邁度推卷舒忘懷附罔象交樂盈胸襟神會流俯仰大同羅萬殊蔚若充甸網寄旅海驅鄉委化同天壤
